<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando Se lembro</title>
    <style>
        body {
          background-color: rgb(150, 210, 238) ;
          
        }
    </style>
</head>
<body>
    <h1>RADAR</h1>
    <strong>Vejá se infrigiu uma lei de Velocidade. Coloque sua velocidade:</strong><input type="number" name="txtvel" id="txtvel">
    <input type="button" value="Calcular" onclick="calcular()">
    <div id="res"></div>
    <script>
        function calcular(){
            var txtv = document.querySelector('input#txtvel')
            var res = document.querySelector('div#res')
            var vel = Number(txtv.value)

            res.innerHTML = (`<p> Sua velocidade é de <strong>${vel}Km/h</strong> </p>`)

            if (vel <= 60){
             res.innerHTML += `Você está dentro da velocidade permitida dirija com cuidado`


            } else {
             res.innerHTML += `Você está <strong>MULTADO</strong> por excesso de velocidade`

        }
        res.innerHTML += ('<p> Use sempre cinto de segurança </p>')
      }

    </script>
</body>
</html>
