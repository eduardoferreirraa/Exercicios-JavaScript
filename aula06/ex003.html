<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de contagem</title>
     <style>

        body{
            font: normal 20pt Arial ;
        }
     </style>
</head>
<body>
      <script>
         var nome = window.prompt('Qual é o seu nome? ')
        document.write(`Olá <strong> ${nome}</strong> ! <br> Seu nome tem ${nome.length} letras.`)
        document.write(`<br> Seu nome em maiusculas é ${nome.toUpperCase()}.<br/> `)
        document.write(` Seu nome em minusculo fica ${nome.toLowerCase()}</br>`)
      </script>
</body>
</html>
